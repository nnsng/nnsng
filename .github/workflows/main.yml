name: Daily Contributions

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  make-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git User
        run: |
          git config --global user.name "${{ secrets.USER_NAME }}"
          git config --global user.email "${{ secrets.USER_EMAIL }}"

      - name: Generate Random Number of Commits
        run: |
          echo "commits=$(( ( RANDOM % 15 ) + 1 ))" >> $GITHUB_ENV

      - name: Make Multiple Daily Contributions
        run: |
          for i in $(seq 1 ${{ env.commits }}); do
            echo "Commit #$i: $(date)" >> daily-contribution.txt
            git add daily-contribution.txt
            git commit -m "Daily contribution #$i"
          done
          # Add "---" after all commits
          echo "---" >> daily-contribution.txt

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: daily-contribution
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'Daily Contributions'
          commit-message: 'Daily contributions batch'
          branch: daily-contribution
          base: main
          body: 'This pull request was created automatically by a GitHub Actions workflow to make multiple daily contributions.'
          token: ${{ secrets.GITHUB_TOKEN }}
